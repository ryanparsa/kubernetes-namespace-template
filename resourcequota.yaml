apiVersion: v1
kind: ResourceQuota
metadata:
  name: project-n-rq
  namespace: project-n
  labels:
    app.kubernetes.io/name: project-n
    app.kubernetes.io/part-of: project-n
    app.kubernetes.io/managed-by: kubectl
spec:
  hard:
    # Total CPU/memory that all pods in the namespace can request and use
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "10"
    limits.memory: 10Gi
    # Cap at 15 to leave headroom above HPA maxReplicas (10)
    pods: "15"
